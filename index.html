<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoteSmart - AI Election Learning</title>
  
  <!-- React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      font-family: system-ui, -apple-system, sans-serif;
      color: #333;
    }
    
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .header h1 {
      color: #2563eb;
      font-size: 2.5rem;
      margin-bottom: 5px;
    }
    
    .header p {
      color: #64748b;
      font-size: 1.2rem;
      margin-top: 0;
    }
    
    .form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    textarea {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      resize: vertical;
      box-sizing: border-box;
      outline: none;
    }
    
    textarea:focus {
      border-color: #2563eb;
    }
    
    button {
      background-color: #2563eb;
      color: white;
      padding: 12px 24px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:hover:not(:disabled) {
      background-color: #1d4ed8;
    }
    
    button:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }
    
    .response-box {
      margin-top: 30px;
      padding: 20px;
      background-color: white;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    
    .response-title {
      font-size: 1.2rem;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 10px;
      margin-top: 0;
    }
    
    .response-content {
      line-height: 1.6;
      font-size: 16px;
      color: #334155;
      white-space: pre-wrap; /* Preserves formatting and line breaks */
    }
    
    .error-text {
      color: #ef4444;
      font-weight: bold;
    }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [prompt, setPrompt] = useState('');
      const [response, setResponse] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(false);

      // Your Gemini API Key
      const API_KEY = "AIzaSyADK5jbUNEn-Kwa6R3gHFfhw99-Rw9HHkI"; 

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!prompt.trim()) return;

        setLoading(true);
        setResponse('');
        setError(false);

        // System prompt to instruct the AI
        const fullPrompt = `You are an expert election educator. Answer the user's question, tell them a story, or give them a quiz about elections based on their request. Keep it simple and easy to understand. \n\nUser request: ${prompt}`;

        try {
          // Direct fetch call to Gemini API using gemini-flash-latest
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${API_KEY}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              contents: [{
                parts: [{
                  text: fullPrompt
                }]
              }]
            })
          });

          const data = await res.json();

          if (data.error) {
            throw new Error(data.error.message);
          }

          // Extract text from response
          const textResponse = data.candidates[0].content.parts[0].text;
          setResponse(textResponse);
          
        } catch (err) {
          console.error(err);
          setError(true);
          setResponse("Error: " + err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="container">
          <header className="header">
            <h1>VoteSmart</h1>
            <p>AI Election Learning Website</p>
          </header>
          
          <form className="form" onSubmit={handleSubmit}>
            <textarea
              value={prompt}
              onChange={(e) => setPrompt(e.target.value)}
              placeholder="Ask a question about US elections, ask for a story, or ask for a quiz..."
              rows="4"
            />
            <button type="submit" disabled={loading}>
              {loading ? 'Learning...' : 'Learn'}
            </button>
          </form>

          {response && (
            <div className="response-box">
              <h2 className="response-title">AI Response:</h2>
              <div className={`response-content ${error ? 'error-text' : ''}`}>
                {response}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
